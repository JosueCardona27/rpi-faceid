<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="login.css">
<title>SistemaFacial — Iniciar sesion</title>
</head>
<body>

  <div class="login-container">
    <h2>LabControl</h2>

    <form>
      <div class="input-group">
        <label for="email">Correo institucional</label>
        <input type="email" id="email" placeholder="ejemplo@escuela.edu">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="********">
      </div>

      <button class="btn-login">Iniciar sesión</button>
    </form>

    <div class="extra">
      ¿Olvidaste tu contraseña? <a href="#">Recuperar</a>
    </div>
  </div>

<!--
  sql.js: SQLite compilado a WebAssembly.
  Permite leer archivos .db directamente en el navegador sin servidor.
  CDN: https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js
-->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="./js/login.js"></script>
</body>
</html>
