<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="login.css">
  <title>SistemaFacial — Iniciar sesión</title>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="card">
    <div class="card-body">

      <div class="logo">
        <div class="logo-icon">LC</div>
        <div>
          <div class="logo-name">LabControl</div>
          <div class="logo-sub">Sistema de Gestión</div>
        </div>
      </div>

      <h1>Iniciar sesión</h1>
      <p class="subtitle">Acceso exclusivo para maestros y administradores.</p>

      <!-- Mensaje de error / éxito -->
      <div class="msg" id="msg"></div>

      <div class="field">
        <label for="correo">Número de cuenta o correo institucional</label>
        <input
          type="text"
          id="correo"
          placeholder="12345678  ó  usuario@ucol.mx"
          autocomplete="username"
        >
      </div>

      <div class="field">
        <label for="pwd">Contraseña</label>
        <input
          type="password"
          id="pwd"
          placeholder="••••••••"
          autocomplete="current-password"
        >
      </div>

      <button class="btn" id="btnLogin" onclick="iniciarSesion()" disabled>
        Iniciar sesión
        <div class="spinner"></div>
      </button>

      <div class="info">
        <div class="db-status">
          <div class="db-dot loading" id="dbDot"></div>
          <span id="dbLabel">Cargando base de datos…</span>
        </div>
        <div style="margin-top:6px">
          Servidor: <code>python -m http.server 8080</code> desde la raíz del proyecto.
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
